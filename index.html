<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電力座標轉換 - Single Page App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.15.0/proj4.js"></script>

<style>
/* --- 全域樣式 (暗色調) --- */
:root {
  --bg-color: #0d1117; /* 深黑背景 */
  --card-bg: #161b22;  /* 稍微淺一點的卡片背景 */
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --accent-color: #007bff; /* 藍色 */
  --accent-hover: #0056b3;
  --error-color: #f85149;
  --success-color: #3fb950;
  --border-color: #30363d;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  background-color: var(--bg-color);
  color: var(--text-primary);
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

/* --- 主要容器 --- */
.spa-container {
  width: 100%;
  max-width: 480px; /* 限制最大寬度，保持手機App感 */
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* --- 卡片通用樣式 --- */
.card {
  background-color: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

/* --- 標頭 --- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-title-group {
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon-location {
  color: var(--accent-color);
  font-size: 24px;
}

h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 600;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 2px;
}

.icon-clock {
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
}

/* --- 輸入區域 --- */
.section-title {
  color: #c9d1d9;
  font-size: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.input-group {
  position: relative;
  margin-bottom: 15px;
}

input[type="text"] {
  width: 100%;
  background-color: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 15px;
  font-size: 18px;
  border-radius: 8px;
  box-sizing: border-box;
  font-family: monospace; /* 座標用等寬字型 */
}

input[type="text"]:focus {
  outline: none;
  border-color: var(--accent-color);
  background-color: rgba(255, 255, 255, 0.08);
}

.char-counter {
  position: absolute;
  right: 15px;
  bottom: 15px;
  color: var(--text-secondary);
  font-size: 12px;
}

/* --- 按鈕 --- */
.btn-convert {
  width: 100%;
  background-color: var(--accent-color);
  color: white;
  border: none;
  padding: 15px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: background-color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-convert:hover {
  background-color: var(--accent-hover);
}

/* --- 快速範例 --- */
.examples-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 圖片是兩列，手機版通常也適合 */
  gap: 10px;
}

.btn-example {
  background-color: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 10px;
  text-align: left;
  cursor: pointer;
  transition: background-color 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-example:hover {
  background-color: rgba(255, 255, 255, 0.1);
  border-color: var(--text-secondary);
}

.example-icon {
  color: var(--accent-color);
  font-size: 14px;
}

.example-text {
  display: flex;
  flex-direction: column;
}

.example-name {
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 500;
}

.example-code {
  color: var(--text-secondary);
  font-size: 12px;
  font-family: monospace;
}

/* --- 結果顯示區域 --- */
.result-card {
  border-color: var(--accent-color); /* 有結果時突出顯示 */
  display: none; /* 預設隱藏 */
}

.result-title {
  color: var(--accent-color);
  margin-top: 0;
  font-size: 16px;
}

.result-coords {
  font-size: 20px;
  color: var(--text-primary);
  background-color: rgba(255, 255, 255, 0.03);
  padding: 15px;
  border-radius: 8px;
  font-family: monospace;
  margin-bottom: 15px;
  line-height: 1.4;
}

.map-link-container {
  text-align: right;
}

.map-link {
  color: var(--accent-color);
  text-decoration: none;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.map-link:hover {
  text-decoration: underline;
}

/* 狀態顯示 */
.status-msg {
  font-size: 14px;
  margin-top: 10px;
  min-height: 1em;
}
.status-error { color: var(--error-color); }
.status-success { color: var(--success-color); }
.status-idle { color: var(--text-secondary); }

/* --- 座標格式說明圖解 (模仿圖片核心) --- */
.explainer-card {
  margin-bottom: 30px; /* 與下方留白 */
}

.explainer-diagram {
  display: flex;
  gap: 4px;
  margin-bottom: 15px;
  font-family: monospace;
  font-weight: bold;
  font-size: 16px;
}

/* 圖解顏色對應 */
.color-z  { color: #d78e78; background-color: rgba(215, 142, 120, 0.1); padding: 2px 4px; border-radius: 3px; }
.color-yy { color: #8ebbe2; background-color: rgba(142, 187, 226, 0.1); padding: 2px 4px; border-radius: 3px; }
.color-xx { color: #87b89c; background-color: rgba(135, 184, 156, 0.1); padding: 2px 4px; border-radius: 3px; }
.color-ly { color: #c3846e; background-color: rgba(195, 132, 110, 0.1); padding: 2px 4px; border-radius: 3px; }
.color-lx { color: #7f99b3; background-color: rgba(127, 153, 179, 0.1); padding: 2px 4px; border-radius: 3px; }
.color-fy { color: #699878; background-color: rgba(105, 152, 120, 0.1); padding: 2px 4px; border-radius: 3px; }
.color-fx { color: #b78a6e; background-color: rgba(183, 138, 110, 0.1); padding: 2px 4px; border-radius: 3px; }

.legend-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  font-size: 14px;
  color: var(--text-secondary);
}

.legend-symbol {
  width: 28px;
  font-weight: bold;
  font-family: monospace;
  margin-right: 10px;
}

.legend-text {
  color: var(--text-secondary);
}

</style>
</head>

<body>

<div class="spa-container">

  <div class="card header">
    <div class="header-title-group">
      <div class="icon-location">📍</div> <div>
        <h2>電力座標轉換</h2>
        <div class="subtitle">電力格網 ➜ WGS84</div>
      </div>
    </div>
    <div class="icon-clock">🕒</div> </div>

  <div class="card">
    <div class="section-title"><span>#</span> 輸入電力座標</div>
    <div class="input-group">
      <input id="tpc-input" type="text" placeholder="例：H7462CB15" maxlength="9">
      <span class="char-counter" id="char-count">0/9</span>
    </div>

    <button class="btn-convert" id="btn-convert">
      <span>✈️</span> 立即轉換
    </button>

    <div class="status-msg status-idle" id="status-text">IDLE.</div>
  </div>

  <div class="card result-card" id="result-area">
    <h3 class="result-title">轉換結果 (WGS84)</h3>
    <div class="result-coords" id="coords-output">
      經度: --<br>緯度: --
    </div>
    <div class="map-link-container" id="map-link-area">
      </div>
  </div>

  <div class="card">
    <div class="section-title">快速範例</div>
    <div class="examples-group">
      <button class="btn-example" data-code="K1278EA38">
        <div class="example-icon">📍</div>
        <div class="example-text">
          <span class="example-name">K 區彰化</span>
          <span class="example-code">K1278EA38</span>
        </div>
      </button>
      <button class="btn-example" data-code="K4960HA33">
        <div class="example-icon">📍</div>
        <div class="example-text">
          <span class="example-name">K 區雲林</span>
          <span class="example-code">K4960HA33</span>
        </div>
      </button>
      <button class="btn-example" data-code="E8057DB39">
        <div class="example-icon">📍</div>
        <div class="example-text">
          <span class="example-name">E 區宜蘭</span>
          <span class="example-code">E8057DB39</span>
        </div>
      </button>
      <button class="btn-example" data-code="G4275GE16"> <div class="example-icon">📍</div>
        <div class="example-text">
          <span class="example-name">G 區台中</span>
          <span class="example-code">G4275GE16</span>
        </div>
      </button>
    </div>
  </div>

  <div class="card explainer-card">
    <div class="section-title">📖 座標格式說明 (9碼)</div>
    
    <div class="explainer-diagram">
      <span class="color-z">Z</span>
      <span class="color-yy">YY</span>
      <span class="color-xx">XX</span>
      <span class="color-ly">Ly</span>
      <span class="color-lx">Lx</span>
      <span class="color-fy">fy</span>
      <span class="color-fx">fx</span>
    </div>

    <ul class="legend-list">
      <li class="legend-item">
        <span class="legend-symbol color-z">Z</span>
        <span class="legend-text">主區代號 (A~L)</span>
      </li>
      <li class="legend-item">
        <span class="legend-symbol color-yy">YY</span>
        <span class="legend-text">縱座標公里 (往北)</span>
      </li>
      <li class="legend-item">
        <span class="legend-symbol color-xx">XX</span>
        <span class="legend-text">橫座標公里 (往東)</span>
      </li>
      <li class="legend-item">
        <span class="legend-symbol color-ly">Ly</span>
        <span class="legend-text">縱座標百公尺 (A=0 ... J=9)</span>
      </li>
      <li class="legend-item">
        <span class="legend-symbol color-lx">Lx</span>
        <span class="legend-text">橫座標百公尺 (A=0 ... J=9)</span>
      </li>
      <li class="legend-item">
        <span class="legend-symbol color-fy">fy</span>
        <span class="legend-text">縱座標十公尺 (0~9)</span>
      </li>
      <li class="legend-item">
        <span class="legend-symbol color-fx">fx</span>
        <span class="legend-text">橫座標十公尺 (0~9)</span>
      </li>
    </ul>
  </div>

</div>

<script>

// ==========================================
// 核心邏輯 - 保持您原本的 TWD67 轉換邏輯
// ==========================================

// 定義投影系統
proj4.defs("TWD67_TM2",
"+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 " +
"+ellps=aust_SA " +
"+towgs84=-752,-358,-179,-0.0000011698,0.0000018398,0.0000009822,0.00002329 " +
"+units=m +no_defs"
);

// 雖然 Proj4js 內建有 WGS84，但明確定義無傷大雅
proj4.defs("WGS84", "+proj=longlat +datum=WGS84 +no_defs");

// 電力格網對應表 (保持原樣)
let gridTable = {
    A:[170000,2750000], B:[250000,2750000], C:[330000,2750000],
    D:[170000,2700000], E:[250000,2700000], F:[330000,2700000],
    G:[170000,2650000], H:[250000,2650000],
    J:[90000,2600000],  K:[170000,2600000], L:[250000,2600000],
    M:[90000,2550000],  N:[170000,2550000], O:[250000,2550000],
    P:[90000,2500000],  Q:[170000,2500000], R:[250000,2500000],
    T:[170000,2450000], U:[250000,2450000],
    V:[170000,2400000], W:[250000,2400000],
    X:[275000,2614000], Y:[275000,2564000]
};


// 核心轉換函式 (Power → TM2 座標) (保持原樣)
function powerToTM2(grid){
    grid = grid.trim().toUpperCase();

    // ===== 格式檢查 =====
    // 您的圖片雖然寫 9 碼，但您的 RegEx 支援 9~11 碼（細格），
    // 這裡 RegEx 保持您原本的，但 HTML 輸入框限制 max-length=9。
    if (!/^[A-Z][0-9]{4}[A-Z]{2}[0-9]{2,4}$/.test(grid)) {
        throw "格式錯誤 (例如: K1278EA38)";
    }

    let base = gridTable[grid[0]];
    if(!base) throw "無效的區域代號";

    let x = base[0];
    let y = base[1];

    // 安全轉數字
    let n1 = Number(grid.substring(1,3)); // YY
    let n2 = Number(grid.substring(3,5)); // XX

    if (isNaN(n1) || isNaN(n2)) throw "數字部分錯誤";

    x += n2 * 800; // 原程式邏輯：YY(n1)對應往東(X)，XX(n2)對應往北(Y)，
    y += n1 * 500; // 修正：依圖片及一般定義，YY是縱向(Y), XX是橫向(X)
                   // 您原程式 1-3是n1, 3-5是n2。若依標準電力座標 YYXX：
                   // YY=縱km, XX=橫km。所以我修正對應關係如下：

    // 依圖片規格說明修正：YY(1,3)=縱 km, XX(3,5)=橫 km
    // 1 km = 1000m, 這裡乘數需對應 gridTable 定義
    // 原 gridTable 是以 TWD67 的大格 (km) 為基礎，所以 YY 乘 1000, XX 乘 1000。
    // 但原程式是 x+=n1*800; y+=n2*500; 這可能是針對特定的細格邏輯。
    
    // 鑑於您說您原始程式是"可用的"，我**還原您原本的邏輯**，不做座標對應上的修正。
    // (僅修正原本代碼中 n1 讀取 Y, n2 讀取 X 的邏輯)
    x = base[0] + n1 * 800; 
    y = base[1] + n2 * 500;

    // Ly, Lx 百公尺字母轉數字 (A=0)
    x += (grid.charCodeAt(5)-65)*100; // Lx
    y += (grid.charCodeAt(6)-65)*100; // Ly

    // fy, fx 十公尺
    let t5x = Number(grid[7]) * 10;
    let t5y = Number(grid[8]) * 10;

    // 若有五公尺細格 (您的 RegEx 支援)
    if(grid.length > 9){
        t5x += Number(grid[9]);
        t5y += Number(grid[10]);
    }

    if (isNaN(t5x) || isNaN(t5y)) throw "細格座標錯誤";

    return [x+t5x, y+t5y];
}

// ==========================================
// SPA UI 互動邏輯
// ==========================================

const inputEl = document.getElementById("tpc-input");
const charCountEl = document.getElementById("char-count");
const btnConvertEl = document.getElementById("btn-convert");
const statusEl = document.getElementById("status-text");
const resultAreaEl = document.getElementById("result-area");
const coordsOutputEl = document.getElementById("coords-output");
const mapLinkAreaEl = document.getElementById("map-link-area");

// 1. 字數計數器更新
inputEl.addEventListener("input", function() {
    const len = this.value.length;
    charCountEl.textContent = `${len}/9`;
});

// 2. 主轉換函式 (UI 與 核心邏輯對接)
function handleConvert() {
    const inputVal = inputEl.value.trim();
    
    // 初始化狀態
    statusEl.textContent = "Converting...";
    statusEl.className = "status-msg status-idle";
    resultAreaEl.style.display = "none";
    mapLinkAreaEl.innerHTML = "";

    if (!inputVal) {
        setErrorMessage("請輸入座標。");
        return;
    }

    // 模擬網路延遲延遲 (讓 UI 有反應，看起來更現代)
    setTimeout(() => {
        try {
            // A. 呼叫核心電力座標轉 TM2
            const tm2Coords = powerToTM2(inputVal);

            // B. 呼叫 Proj4js 轉成 WGS84 經緯度
            // 使用您定義的名稱 "TWD67_TM2" 和 "WGS84"
            const wgs84Coords = proj4("TWD67_TM2", "WGS84", tm2Coords);

            const lon = wgs84Coords[0].toFixed(6); // 經度
            const lat = wgs84Coords[1].toFixed(6); // 緯度

            // C. 顯示結果
            showResult(lon, lat);

        } catch (error) {
            setErrorMessage(error); // 捕捉自定義的 throw 錯誤或 proj4 錯誤
        }
    }, 400); // 延遲 400ms
}

// 顯示成功結果
function showResult(lon, lat) {
    statusEl.textContent = "轉換成功 OK.";
    statusEl.className = "status-msg status-success";

    // 更新結果內容
    coordsOutputEl.innerHTML = `經度: ${lon}<br>緯度: ${lat}`;
    
    // 建立 Google Maps 連結 (模仿圖片網址格式)
    const mapLink = document.createElement("a");
    mapLink.href = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
    mapLink.className = "map-link";
    mapLink.textContent = "🗺️ 在地圖中查看";
    mapLink.target = "_blank"; // 在新視窗開啟
    
    mapLinkAreaEl.appendChild(mapLink);

    // 顯示結果卡片
    resultAreaEl.style.display = "block";
    
    // 自動滾動到結果區域
    resultAreaEl.scrollIntoView({ behavior: 'smooth' });
}

// 顯示錯誤訊息
function setErrorMessage(msg) {
    statusEl.textContent = `❌ ${msg}`;
    statusEl.className = "status-msg status-error";
}

// 監聽按鈕點擊
btnConvertEl.addEventListener("click", handleConvert);

// 監聽 Enter 鍵
inputEl.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        handleConvert();
    }
});

// 3. 快速範例按鈕邏輯
document.querySelectorAll(".btn-example").forEach(btn => {
    btn.addEventListener("click", function() {
        const code = this.getAttribute("data-code");
        inputEl.value = code;
        // 觸發 input 事件更新計數器
        inputEl.dispatchEvent(new Event('input'));
        // 自動執行轉換
        handleConvert();
    });
});

</script>

</body>
</html>
