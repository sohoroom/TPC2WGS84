<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TPC Power Coordinate → WGS84</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.15.0/proj4.js"></script>

<style>
body { font-family: Arial; padding:20px; }
input, button { font-size:16px; margin:5px; }
.result { margin-top:15px; font-size:18px; color:blue; }
</style>
</head>

<body>

<h2>Power Coordinate → WGS84</h2>

<input id="input" placeholder="e.g. K1278EA38">
<button id="btn">Convert</button>

<div class="result" id="status"></div>
<div class="result" id="output"></div>
<div class="result" id="maplink"></div>

<script>

// ================================
// Projection
// 不可使用"多行 template string（反引號）"
// 應使用"字串拼接"或"單行字串"
// ================================
proj4.defs("TWD67_TM2",
"+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 " +
"+ellps=aust_SA " +
"+towgs84=-752,-358,-179,-0.0000011698,0.0000018398,0.0000009822,0.00002329 " +
"+units=m +no_defs"
);

proj4.defs("WGS84", "+proj=longlat +datum=WGS84 +no_defs");

document.getElementById("status").innerHTML = "IDLE.";

// ================================
// Grid table
// ================================
let gridTable = {
    A:[170000,2750000], B:[250000,2750000], C:[330000,2750000],
    D:[170000,2700000], E:[250000,2700000], F:[330000,2700000],
    G:[170000,2650000], H:[250000,2650000],
    J:[90000,2600000],  K:[170000,2600000], L:[250000,2600000],
    M:[90000,2550000],  N:[170000,2550000], O:[250000,2550000],
    P:[90000,2500000],  Q:[170000,2500000], R:[250000,2500000],
    T:[170000,2450000], U:[250000,2450000],
    V:[170000,2400000], W:[250000,2400000],
    X:[275000,2614000], Y:[275000,2564000]
};


// ================================
// Power → TM2
// ================================
function powerToTM2(grid){

    grid = grid.trim().toUpperCase();

    // ===== 格式檢查 =====
    if (!/^[A-Z][0-9]{4}[A-Z]{2}[0-9]{2,4}$/.test(grid)) {
        throw "Invalid format (example: K1278EA38)";
    }

    let base = gridTable[grid[0]];
    if(!base) throw "Invalid grid code";

    let x = base[0];
    let y = base[1];

    // 安全轉數字（避免 parseInt 吃到字母）
    let n1 = Number(grid.substring(1,3));
    let n2 = Number(grid.substring(3,5));

    if (isNaN(n1) || isNaN(n2)) throw "Invalid numeric part";

    x += n1 * 800;
    y += n2 * 500;

    x += (grid.charCodeAt(5)-65)*100;
    y += (grid.charCodeAt(6)-65)*100;

    let t5x = Number(grid[7]) * 10;
    let t5y = Number(grid[8]) * 10;

    if(grid.length > 9){
        t5x += Number(grid[9]);
        t5y += Number(grid[10]);
    }

    if (isNaN(t5x) || isNaN(t5y)) throw "Invalid fine grid";

    return [x+t5x, y+t5y];
}


// ================================
// Convert function
// ================================
function convert(){

    try{
		document.getElementById("status").innerHTML = "Converting.";
        let input = document.getElementById("input").value;

        let tm2 = powerToTM2(input);
        let result = proj4("TWD67_TM2","WGS84", tm2);

        let lon = result[0];
        let lat = result[1];
		let link = document.createElement("a");
		link.href = "https://www.google.com/maps?q=" + lat + "," + lon;
		link.textContent = 'Google Maps連結'; // 設定顯示文字
		link.target = '_blank'; // (選用) 設定在新視窗開啟
		let linka = document.getElementById("maplink").querySelectorAll('a')
		
		if(linka.length >= 1){
			//alert("Has 'a' >= 1");
			//linka.forEach(function(a) {
			//a.remove();
			//});
			document.getElementById("maplink").innerHTML = "";
		}		
		
        document.getElementById("output").innerHTML = "Longitude: " + lon + "<br>Latitude: " + lat;
		document.getElementById("maplink").appendChild(link); // 增加在父元素內容的最後面 [2]
		//document.getElementById('container').innerHTML += '<a href="https://www.google.com" target="_blank">前往 Google</a>';
		document.getElementById("status").innerHTML = "Convert OK.";
		setTimeout(() => {document.getElementById("status").innerHTML = "IDLE.";}, 300);
		
    }catch(e){
        document.getElementById("status").innerHTML = "Convert error!";
		document.getElementById("output").innerHTML = "Error: " + e;
		document.getElementById("maplink").innerHTML = "";
    }
}

// ================================
// Event binding（關鍵）
// ================================
document.getElementById("btn").addEventListener("click", convert);

</script>

</body>
</html>
