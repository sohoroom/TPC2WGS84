<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>電力座標轉換器</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="電力轉換">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.15.0/proj4.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="spa-container">
    <header class="card header">
        <div class="header-title-group">
            <div class="icon-location">📍</div>
            <div>
                <h2>電力座標轉換</h2>
                <div class="subtitle">TWD67 格網 ➜ WGS84</div>
            </div>
        </div>
        <div class="icon-clock" onclick="alert('離線功能已啟用')">🕒</div>
    </header>

    <main class="card">
        <div class="section-title"><span>#</span> 輸入電力座標 (9/11碼)</div>
        <div class="input-group">
            <input id="tpc-input" type="text" placeholder="例：K1278EA3852" maxlength="11" spellcheck="false">
            <span class="char-counter" id="char-count">0/11</span>
        </div>

        <button class="btn-convert" id="btn-convert">
            <span>✈️</span> 立即轉換
        </button>

        <div class="status-msg status-idle" id="status-text">系統就緒</div>
    </main>

    <section class="card result-card" id="result-area">
        <h3 class="result-title">轉換結果</h3>
        <div class="result-coords" id="coords-output">
            經度: --<br>緯度: --
        </div>
        <div class="map-link-container" id="map-link-area"></div>
    </section>

<section class="card">
        <div class="section-title">快速範例</div>
        <div class="examples-group">
            <button class="btn-example" data-code="K1278EA38">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">K 區彰化</span>
                    <span class="example-code">K1278EA38</span>
                </div>
            </button>
            <button class="btn-example" data-code="K4960HA33">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">K 區雲林</span>
                    <span class="example-code">K4960HA33</span>
                </div>
            </button>
            <button class="btn-example" data-code="E8057DB39">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">E 區宜蘭</span>
                    <span class="example-code">E8057DB39</span>
                </div>
            </button>
            <button class="btn-example" data-code="G4275GE16">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">G 區台中</span>
                    <span class="example-code">G4275GE16</span>
                </div>
            </button>
        </div>
    </section>
</div>

<script src="script.js"></script>
<script>
    // 註冊 Service Worker (PWA 核心)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW 註冊成功'))
                .catch(err => console.log('SW 註冊失敗', err));
        });
    }
</script>
</body>
</html>
