<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電力座標轉換 - SPA Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.15.0/proj4.js"></script>
</head>
<body>

<div class="spa-container">
    <header class="card header">
        <div class="header-title-group">
            <div class="icon-location">📍</div>
            <div>
                <h2>電力座標轉換</h2>
                <div class="subtitle">電力格網 (9/11碼) ➜ WGS84</div>
            </div>
        </div>
        <div class="icon-clock">🕒</div>
    </header>

    <main class="card">
        <div class="section-title"><span>#</span> 輸入電力座標</div>
        <div class="input-group">
            <input id="tpc-input" type="text" placeholder="例：K1278EA38" maxlength="11">
            <span class="char-counter" id="char-count">0/11</span>
        </div>

        <button class="btn-convert" id="btn-convert">
            <span>✈️</span> 立即轉換
        </button>

        <div class="status-msg status-idle" id="status-text">IDLE.</div>
    </main>

    <section class="card result-card" id="result-area">
        <h3 class="result-title">轉換結果 (WGS84)</h3>
        <div class="result-coords" id="coords-output">
            經度: --<br>緯度: --
        </div>
        <div class="map-link-container" id="map-link-area"></div>
    </section>

    <section class="card">
        <div class="section-title">快速範例</div>
        <div class="examples-group">
            <button class="btn-example" data-code="K1278EA38">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">K 區彰化</span>
                    <span class="example-code">K1278EA38</span>
                </div>
            </button>
            <button class="btn-example" data-code="K4960HA33">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">K 區雲林</span>
                    <span class="example-code">K4960HA33</span>
                </div>
            </button>
            <button class="btn-example" data-code="E8057DB39">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">E 區宜蘭</span>
                    <span class="example-code">E8057DB39</span>
                </div>
            </button>
            <button class="btn-example" data-code="G4275GE16">
                <div class="example-icon">📍</div>
                <div class="example-text">
                    <span class="example-name">G 區台中</span>
                    <span class="example-code">G4275GE16</span>
                </div>
            </button>
        </div>
    </section>

    <footer class="card explainer-card">
        <div class="section-title">📖 座標格式說明</div>
        <div class="explainer-diagram">
            <span class="color-z">Z</span><span class="color-yy">YY</span><span class="color-xx">XX</span><span class="color-ly">Ly</span><span class="color-lx">Lx</span><span class="color-fy">fy</span><span class="color-fx">fx</span><span class="color-f1">y1</span><span class="color-f1">x1</span>
        </div>
        <ul class="legend-list">
            <li class="legend-item"><span class="legend-symbol color-z">Z</span> 主區代號 (A~Y)</li>
            <li class="legend-item"><span class="legend-symbol color-yy">YY</span> 縱座標公里 / <span class="legend-symbol color-xx">XX</span> 橫座標公里</li>
            <li class="legend-item"><span class="legend-symbol color-ly">Ly/Lx</span> 百公尺格 (A=0 ... J=9)</li>
            <li class="legend-item"><span class="legend-symbol color-fy">fy/fx</span> 十公尺格 (0~9)</li>
            <li class="legend-item"><span class="legend-symbol color-f1">y1/x1</span> 一公尺格 (僅 11 碼支援)</li>
        </ul>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
